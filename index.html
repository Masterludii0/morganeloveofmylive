<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pour morgane mbb</title>
    <style>
        :root {
            --neon-red: #ff00c8;
            --bg-dark: #020202;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Empêche le scroll bizarre sur mobile */
        }

        #background-neon {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: none;
        }

        .bg-text {
            position: absolute;
            color: hsla(313, 100%, 50%, 0.3);
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            animation: neon-pulse 2s infinite ease-in-out;
        }

        @keyframes neon-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; text-shadow: 0 0 5px var(--neon-red); }
            50% { transform: scale(1.1); opacity: 0.5; text-shadow: 0 0 20px var(--neon-red); }
        }

        #init-screen {
            text-align: center;
            z-index: 100;
            border: 1px solid var(--neon-red);
            padding: 20px; /* Réduit pour mobile */
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 30px hsla(313, 100%, 50%, 0.3);
            width: 80%; /* S'adapte à la largeur du mobile */
            max-width: 400px;
        }

        .decrypt-btn {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-red);
            padding: 15px 20px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        .decrypt-btn:hover {
            background: var(--neon-red);
            box-shadow: 0 0 50px var(--neon-red);
        }

        #heart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: none;
        }

        .photo-item {
            position: absolute;
            width: 50px; /* Taille de base mobile */
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
            box-shadow: 0 0 10px var(--neon-red);
            animation: heart-beat 1.5s infinite ease-in-out;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            z-index: 15;
        }

        /* Taille plus grande pour ordinateur */
        @media (min-width: 768px) {
            .photo-item { width: 65px; height: 65px; }
            .main-love { font-size: 5rem !important; }
        }

        .heart-text {
            position: absolute;
            color: var(--neon-red);
            font-weight: bold;
            font-size: 10px; /* Plus petit sur mobile */
            text-shadow: 0 0 8px var(--neon-red);
            animation: heart-beat 1.5s infinite ease-in-out;
            z-index: 12;
            white-space: nowrap;
        }

        .main-love {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem; /* Taille mobile par défaut */
            color: white;
            text-shadow: 0 0 30px var(--neon-red), 0 0 60px var(--neon-red);
            z-index: 25;
            pointer-events: none;
            display: none;
            font-weight: 900;
            text-align: center;
            width: 100%;
        }

        @keyframes heart-beat {
            0%, 100% { transform: scale(1) translate(-50%, -50%); }
            50% { transform: scale(1.15) translate(-50%, -50%); filter: brightness(1.3); }
        }
    </style>
</head>

<body>

    <div id="background-neon"></div>

    <div id="init-screen">
        <h2 style="color: #666; font-size: 0.7rem; letter-spacing: 2px;">[SOUVENIRS CHIFFRÉS DÉTECTÉS]</h2>
        <button class="decrypt-btn" onclick="lancerFusion()">DÉCRYPTER L'AMOUR</button>
    </div>

    <div id="heart-container"></div>
    <div id="main-text" class="main-love">Je T'Aime.</div>

    <script>
        const mesPhotos = [
            "https://cdn.discordapp.com/attachments/1340504262022660167/1504132891947438220/image.jpg?ex=6a05e06a&is=6a048eea&hm=396b3cfc0d2eb0bfcbab46a653bd0c409dadf46957726571374b7e56fd36a7fd&",
            "https://media.discordapp.net/attachments/1340504262022660167/1504132892283109386/image.jpg?ex=6a05e06a&is=6a048eea&hm=632e6ab20d0b6326cd53c3075d60980bb195ca5da8dd5ed1eec9f91878da419f&=&format=webp&width=481&height=856",
            "https://media.discordapp.net/attachments/1340504262022660167/1504132892681572483/image.jpg?ex=6a05e06b&is=6a048eeb&hm=15dd1f4cf41ea689658fc3c747bebedfc44c7481a0bf854b365380231bdeb289&=&format=webp&width=642&height=856",
            "https://media.discordapp.net/attachments/1340504262022660167/1504132893075705998/image.jpg?ex=6a05e06b&is=6a048eeb&hm=f0245b4df47dfee104b375cd85c5866f153c3efb540455f3a9a699430ab35da8&=&format=webp&width=481&height=856",
            "https://media.discordapp.net/attachments/1340504262022660167/1504132893356851381/image.jpg?ex=6a05e06b&is=6a048eeb&hm=d67cded9ca42654bb09f740956d417ff3830cdf117c0b9593ad21ba889f4d6e5&=&format=webp&width=481&height=856",
            "https://media.discordapp.net/attachments/1340504262022660167/1504133408618446868/IMG_8963.jpg?ex=6a05e0e6&is=6a048f66&hm=d761e7ae2885bc9082713569fa8bab1fc51181d8cf2bd17644c476fd1171a252&=&format=webp&width=540&height=960",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134012841754745/image.jpg?ex=6a05e176&is=6a048ff6&hm=26c38cb54b552fd895939059e096b828967d8f37974d8f5fb9eae4ce2d78f5e9&=&format=webp&width=540&height=960",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134347274453195/image.jpg?ex=6a05e1c5&is=6a049045&hm=c59d0dfdba20ad123ed98c93d0490391b749d3385746b308a7ae7657b16a396b&=&format=webp",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134496360988682/image.jpg?ex=6a05e1e9&is=6a049069&hm=e1a999b11ea58a9c1eff9f01a226b009a85a21858e0b80f44d326307f02ee61e&=&format=webp&width=540&height=960",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134620789346485/image.jpg?ex=6a05e207&is=6a049087&hm=e90f71478da03d0faf5cacfa795228723631f5b93838de07567d44ce8bb39c1a&=&format=webp&width=720&height=960",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134702125289483/image.jpg?ex=6a05e21a&is=6a04909a&hm=0401339c4aa82d13e60930d5b69d3e2008ab174d082cacd60de1fbcc2c53c1f8&=&format=webp&width=1280&height=960",
            "https://media.discordapp.net/attachments/1340504262022660167/1504134749701013514/image.jpg?ex=6a05e225&is=6a0490a5&hm=e2152b1a5febf327fb74d28cdabff3ef5167706bfa77ef8cfe2bf428ec15afab&=&format=webp&width=1522&height=856",
        ];

        function genererFond() {
            const bg = document.getElementById('background-neon');
            const motsDoux = ["JE T'AIME", "MON COEUR", "MBB", "POUPOULELE", "JAVA", "MON CANARD D'AMOUR"];
            for (let i = 0; i < 67; i++) { 
                const span = document.createElement('span');
                span.className = 'bg-text';
                const motAuHasard = motsDoux[Math.floor(Math.random() * motsDoux.length)];
                span.innerText = motAuHasard;
                span.style.left = Math.random() * 100 + "%";
                span.style.top = Math.random() * 100 + "%";
                span.style.fontSize = (Math.random() * 15 + 10) + "px";
                span.style.animationDelay = Math.random() * 2 + "s";
                bg.appendChild(span);
            }
        }

        function lancerFusion() {
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('background-neon').style.display = 'block';
            genererFond();

            const container = document.getElementById('heart-container');
            const mainText = document.getElementById('main-text');
            container.style.display = 'block';
            mainText.style.display = 'block';

            const centreX = window.innerWidth / 2;
            const centreY = window.innerHeight / 2;
            
            // Échelle dynamique : Petit cœur sur mobile, grand cœur sur PC
            const echelle = window.innerWidth < 600 ? window.innerWidth / 32 : 22;

            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const t = Math.random() * 2 * Math.PI;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    const txt = document.createElement('div');
                    txt.className = 'heart-text';
                    txt.innerText = 'I love you';
                    txt.style.left = `${centreX + x * echelle}px`;
                    txt.style.top = `${centreY + y * echelle}px`;
                    txt.style.animationDelay = Math.random() * 2 + "s";
                    container.appendChild(txt);
                }, i * 10);
            }

            for (let i = 0; i < 67; i++) {
                setTimeout(() => {
                    const t = Math.random() * 2 * Math.PI;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    const img = document.createElement('img');
                    img.src = mesPhotos[Math.floor(Math.random() * mesPhotos.length)];
                    img.className = 'photo-item';
                    img.style.left = `${centreX + x * echelle}px`;
                    img.style.top = `${centreY + y * echelle}px`;
                    img.style.animationDelay = Math.random() * 2 + "s";
                    container.appendChild(img);
                }, i * 50 + 500); 
            }
        }
    </script>
</body>
</html>
